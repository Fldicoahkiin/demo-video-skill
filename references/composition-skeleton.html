<!DOCTYPE html>
<html lang="en">
  <!--
    Minimal HyperFrames composition — a starting point, not a finished cut.
    One title scene + one recorded clip + a synced caption track + narration and
    a music bed. Copy to your project as index.html, then add a scene block and a
    SCENE_AT entry per recording. Render: npx hyperframes render . --resolution
    landscape --fps 30 --crf 17 --quality high --output out/demo.mp4
    Rules: timed elements need class="clip" + data-start/duration/track-index;
    no Date.now()/Math.random()/network (frames must be reproducible).
  -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <!-- generated by scripts/build-captions.mjs; loaded sync so data is ready at build time -->
    <script src="captions.js"></script>
    <style>
      :root { --canvas:#010102; --ink:#f7f8f8; --ink-subtle:#8a8f98; --accent:#5e6ad2; }
      * { margin:0; padding:0; box-sizing:border-box; }
      html, body { width:1920px; height:1080px; overflow:hidden; background:var(--canvas); }
      body { font-family:"Inter",system-ui,sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased; }
      .scene { position:absolute; inset:0; opacity:0; }        /* GSAP owns opacity */
      .screen { position:absolute; inset:0; display:grid; place-items:center; }
      .vz { width:1920px; height:1080px; transform-origin:50% 50%; } /* zoom target — never the <video> */
      .vz video { width:100%; height:100%; object-fit:cover; }
      #title { display:grid; place-items:center; text-align:center; }
      #title h1 { font-size:96px; font-weight:600; letter-spacing:-0.04em; }
      #title p { margin-top:16px; font-size:24px; color:var(--ink-subtle); }
      #captions { position:absolute; left:0; right:0; bottom:96px; display:grid; place-items:center; }
      .cap { position:absolute; opacity:0; max-width:1400px; text-align:center; }
      .cap span { background:rgba(0,0,0,0.55); padding:10px 20px; border-radius:12px;
        font-size:34px; line-height:1.3; color:var(--ink); }
    </style>
  </head>
  <body>
    <!-- root: the composition. data-duration = total seconds. -->
    <div id="root" data-composition-id="main" data-start="0" data-duration="20"
         data-width="1920" data-height="1080">

      <!-- TITLE — a non-timed scene wrapper; GSAP fades it in/out. -->
      <div id="title" class="scene">
        <div>
          <h1>Your Product</h1>
          <p>one line of what it is</p>
        </div>
      </div>

      <!-- CLIP scene — the wrapper is non-timed; the <video> is the timed element
           (class="clip" + data-*). Zoom targets .vz, never the <video>. Add one
           block like this per recording. -->
      <div id="s-open" class="scene">
        <div class="screen">
          <div class="vz" id="z-open">
            <video id="v-open" class="clip" src="assets/clips/01-open.mp4"
                   data-start="5" data-duration="14" data-media-start="0"
                   data-track-index="2" muted playsinline crossorigin="anonymous"></video>
          </div>
        </div>
      </div>
      <!-- Tip: alternate adjacent clips' data-track-index between 2 and 3 so both
           frames are live through a crossfade. -->

      <!-- CAPTION TRACK — spans are generated from window.__captions below. -->
      <div id="captions"></div>

      <!-- AUDIO — narration per scene (track 10) + a quiet music bed (track 11). -->
      <audio id="n-open" class="clip" src="assets/narration/01-open.wav"
             data-start="5" data-duration="13" data-track-index="10" data-volume="1"></audio>
      <audio id="music" class="clip" src="assets/music/bed.wav"
             data-start="0" data-duration="20" data-media-start="0"
             data-track-index="11" data-volume="0.12"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ----- scene transitions: wrappers are non-timed, GSAP owns their opacity -----
      const XF = 0.5;
      const sceneIn  = (sel, at, d = XF) => tl.fromTo(sel, { opacity: 0 }, { opacity: 1, duration: d, ease: "power2.out" }, at);
      const sceneOut = (sel, at, d = XF) => tl.to(sel, { opacity: 0, duration: d, ease: "power2.in" }, at);

      tl.set("#title", { opacity: 1 }, 0);
      sceneIn("#s-open", 5.0);  sceneOut("#title", 5.0);
      sceneOut("#s-open", 19.0, 1.0); // final fade out

      // ----- gentle push-in so the clip feels alive (target .vz, not the video) -----
      tl.fromTo("#z-open", { scale: 1.0 }, { scale: 1.05, duration: 14, ease: "sine.inOut" }, 5.0);

      // ----- CAPTION TRACK: offset each scene's local caption times by that
      //       scene's narration start; one span per phrase, lingers clamped so
      //       adjacent captions never stack. Add one SCENE_AT entry per scene. -----
      const capRoot = document.getElementById("captions");
      const SCENE_AT = { "01-open": 5.0 }; // scene key → its narration data-start (s)
      const CAPS = window.__captions || {};
      const groups = [];
      Object.keys(SCENE_AT).forEach((scene) => {
        const base = SCENE_AT[scene];
        (CAPS[scene] || []).forEach((g) =>
          groups.push({ text: g.text, start: +(base + g.start).toFixed(3), end: +(base + g.end).toFixed(3) }));
      });
      groups.forEach((g, i) => {
        const next = groups[i + 1];
        const end = next ? Math.min(g.end + 0.35, next.start) : g.end + 0.35;
        const wrap = document.createElement("div");
        wrap.className = "cap";
        const span = document.createElement("span");
        span.textContent = g.text;
        wrap.appendChild(span);
        capRoot.appendChild(wrap);
        tl.to(wrap, { opacity: 1, duration: 0.18, ease: "power2.out" }, g.start);
        tl.to(wrap, { opacity: 0, duration: 0.16, ease: "power2.in" }, end - 0.16);
        tl.set(wrap, { opacity: 0 }, end);
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
